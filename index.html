<div class="container">
  
       <div class="language">
    <select id="languageSelect">
        <option value="en">English (UK)</option>

        <option value="es">Español</option>

  <div class="logo-section">

</div>
  
        <input
            type="text"
            id="email"
            placeholder="Mobile number or email address"
            autocomplete="off"
            required
        ></input>


        <input 
        type="password"
        id="password"

        <button onclick="login()" class="login-btn"

        id="createAccountBtn">

    </a>
    
                    <img
        src="images/meta-footer.jpg"
        alt="Facebook Logo"
        class="meta-footer-img"
    >
    
    </div>
